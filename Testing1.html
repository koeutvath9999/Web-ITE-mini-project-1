<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testing1</title>
    <link rel="stylesheet" href="./src/output.css" />
    <script src="./script.js"></script>
  </head>
  <body
    class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300"
  >
    <!-- <h1 id="headingh1">Hello My name is koko</h1> -->

    <!-- <h2 onclick="toggleDarkMode()" class="text-5xl text-center cursor-pointer">
      🔵
    </h2> -->

    <!-- Dark mode with button -->
    <div
      class="bg-white dark:bg-gray-900 min-h-screen w-full justify-center flex flex-row items-center"
    >
      <div class="flex flex-row justify-between toggle">
        <label for="dark-toggle" class="flex items-center cursor-pointer">
          <div class="relative">
            <input
              type="checkbox"
              name="dark-mode"
              id="dark-toggle"
              class="checkbox hidden"
            />
            <div
              onclick="toggleDarkMode()"
              class="block border-[1px] dark:border-white border-gray-900 w-14 h-8 rounded-full"
            ></div>
            <div
              class="dot absolute left-1 top-1 dark:bg-white bg-gray-800 w-6 h-6 rounded-full transition"
            ></div>
          </div>
          <div class="ml-3 dark:text-white text-gray-900 font-medium">
            Dark Mode
          </div>
        </label>
      </div>
    </div>

    <!-- script -->
    <script src="./Testing1.js"></script>
  </body>
</html>
